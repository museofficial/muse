name: Make release & publish Docker image

on:
  push:
    tags:
    - 'v*'

env:
  REGISTRY_IMAGE: ghcr.io/museofficial/muse
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/muse

jobs:
  publish:
    strategy:
      matrix:
        runner-platform:
          - ubuntu-latest
          - namespace-profile-default-arm64
        include:
          - runner-platform: ubuntu-latest
            build-arch: linux/amd64
            tagged-platform: amd64
          - runner-platform: namespace-profile-default-arm64
            build-arch: linux/arm64
            tagged-platform: arm64
    runs-on: ${{ matrix.runner-platform }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current time
        id: current-time
        shell: bash
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}-${{ matrix.tagged-platform }}
            ${{ env.REGISTRY_IMAGE }}:${{ github.sha }}-${{ matrix.tagged-platform }}
          platforms: ${{ matrix.build-arch }}
          build-args: |
            COMMIT_HASH=${{ github.sha }}
            BUILD_DATE=${{ steps.current-time.outputs.time }}

  combine:
    name: Combine platform tags
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release image tags
        id: image-tags
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          major="${version%%.*}"
          minor="${version%.*}"
          dockerhub_tags=(
            "${DOCKERHUB_IMAGE}:${version}"
            "${DOCKERHUB_IMAGE}:${minor}"
            "${DOCKERHUB_IMAGE}:${major}"
            "${DOCKERHUB_IMAGE}:latest"
          )
          ghcr_tags=(
            "${REGISTRY_IMAGE}:${version}"
            "${REGISTRY_IMAGE}:${minor}"
            "${REGISTRY_IMAGE}:${major}"
            "${REGISTRY_IMAGE}:latest"
          )
          {
            printf 'dockerhub=%s\n' "$(IFS=,; echo "${dockerhub_tags[*]}")"
            printf 'ghcr=%s\n' "$(IFS=,; echo "${ghcr_tags[*]}")"
          } >> "$GITHUB_OUTPUT"

      - name: Combine tags (Docker Hub)
        run: docker buildx imagetools create $(echo '${{ steps.image-tags.outputs.dockerhub }}' | tr "," "\0" | xargs -0 printf -- '-t %s ') '${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}-arm64' '${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}-amd64'

      - name: Combine tags (GitHub Container Registry)
        run: docker buildx imagetools create $(echo '${{ steps.image-tags.outputs.ghcr }}' | tr "," "\0" | xargs -0 printf -- '-t %s ') '${{ env.REGISTRY_IMAGE }}:${{ github.sha }}-arm64' '${{ env.REGISTRY_IMAGE }}:${{ github.sha }}-amd64'

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ env.DOCKERHUB_IMAGE }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: combine
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get version from tag
        id: tag_name
        run: |
          echo "current_version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Get Changelog Entry
        id: changelog_reader
        shell: bash
        run: |
          version="${{ steps.tag_name.outputs.current_version }}"
          changelog_path="./CHANGELOG.md"
          changes_file="$(mktemp)"

          awk -v version="$version" '
            BEGIN {
              heading = "## [" version "]"
            }
            $0 == heading || index($0, heading " ") == 1 {
              in_section = 1
              next
            }
            in_section && /^## / {
              exit
            }
            in_section {
              lines[++line_count] = $0
            }
            END {
              first = 1
              while (first <= line_count && lines[first] ~ /^[[:space:]]*$/) {
                first++
              }
              while (line_count >= first && lines[line_count] ~ /^[[:space:]]*$/) {
                line_count--
              }
              for (i = first; i <= line_count; i++) {
                print lines[i]
              }
            }
          ' "$changelog_path" > "$changes_file"

          if ! grep -q '[^[:space:]]' "$changes_file"; then
            echo "No changelog entry found for $version in $changelog_path" >&2
            exit 1
          fi

          delimiter="CHANGELOG_$(date +%s%N)"
          {
            echo "version=$version"
            echo "status=released"
            echo "changes<<$delimiter"
            cat "$changes_file"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Create/update release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.changelog_reader.outputs.version }}
          name: Release v${{ steps.changelog_reader.outputs.version }}
          body: ${{ steps.changelog_reader.outputs.changes }}
          prerelease: ${{ steps.changelog_reader.outputs.status == 'prereleased' }}
          draft: ${{ steps.changelog_reader.outputs.status == 'unreleased' }}
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
